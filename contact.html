<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolex - تواصل معنا</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #020604; 
            --gold: #C5A059;
            --gold-hover: #e0bc75;
            --text-muted: #8892b0;
            --text-light: #ccd6f6;
            --card-bg: rgba(4, 12, 8, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* ==========================================================================
           شريط التنقل العلوي الفاخر (Header)
           ========================================================================= */
        header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 75px; 
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 8%;
    background: rgba(3, 7, 5, 0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 1000;
}

.logo-container {
    position: relative;
    display: flex;
    align-items: center;
    height: 100%; 
}

.main-logo {
    position: absolute; 
    top: 50%;
    transform: translateY(-50%); 
    height: 55px; 
    width: auto; 
    object-fit: contain;
}

header nav {
    display: flex;
    align-items: center;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

header nav a {
    color: var(--text-muted);
    text-decoration: none;
    margin: 0 22px; 
    font-size: 15px;
    font-weight: 400;
    transition: color 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

header nav a:hover,
header nav a.active {
    color: var(--gold) !important;
    cursor: pointer;
}

/* ==========================================================================
   3. زر وقائمة اختيار اللغات الموحدة (Dropdown Menu)
   ========================================================================= */
.lang-selector {
    position: relative;
    display: inline-block;
}

.lang-selector button {
    background: transparent;
    border: 1px solid rgba(197, 160, 89, 0.3);
    color: var(--gold);
    padding: 7px 16px;
    cursor: pointer;
    border-radius: 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    transition: all 0.3s ease;
}

.lang-selector button:hover {
    border-color: var(--gold);
    background: rgba(197, 160, 89, 0.05);
}

.dropdown-menu {
    display: none; 
    position: absolute;
    top: 125%; 
    background: rgba(7, 15, 11, 0.95) !important; 
    backdrop-filter: blur(14px); 
    -webkit-backdrop-filter: blur(14px);
    min-width: 160px;
    border: 1px solid rgba(197, 160, 89, 0.15); 
    border-radius: 8px; 
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
    z-index: 2000;
    padding: 6px 0;
}

body[dir="rtl"] .dropdown-menu { left: 0; right: auto; }
body[dir="ltr"] .dropdown-menu { right: 0; left: auto; }

.dropdown-menu span {
    color: #b4bebe; 
    padding: 10px 20px;
    display: block;
    cursor: pointer;
    font-size: 14px;
    font-weight: 400;
    text-align: right;
    transition: all 0.25s ease;
}

.dropdown-menu.show {
    display: block !important;
}

.dropdown-menu span:hover {
    background: rgba(197, 160, 89, 0.08); 
    color: var(--gold); 
    padding-right: 25px; 
}
        /* ==========================================================================
           هيكل صفحة التواصل الفاخرة (Contact Section)
           ========================================================================= */
        .contact-section {
            padding-top: 150px;
            padding-bottom: 80px;
            min-height: calc(100vh - 75px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-left: 6%;
            padding-right: 6%;
        }

        /* حاوية العناوين العلوية بالمنتصف تماماً كالموقع الأصلي */
        .contact-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .contact-header .gold-span {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 1px;
        }

        .contact-header .main-title {
            color: var(--gold);
            font-size: 3rem;
            font-weight: 400;
            margin-bottom: 15px;
        }

        .contact-header .desc-text {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 300;
        }

        /* حاوية التقسيم الرئيسي (فورم + بطاقات) */
        .contact-grid-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 50px;
            align-items: flex-start;
        }

        /* دعم التبديل التلقائي لليمين واليسار حسب اتجاه اللغة */
        html[dir="rtl"] .contact-grid-container { flex-direction: row; }
        html[dir="ltr"] .contact-grid-container { flex-direction: row-reverse; }

        /* عمود الفورم (اليسار في العربي) */
        .contact-form-wrapper {
            flex: 1.4;
            width: 100%;
        }

        .contact-form-wrapper form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-form-wrapper input, 
        .contact-form-wrapper textarea {
            width: 100%;
            background: rgba(4, 12, 8, 0.3);
            border: 1px solid rgba(197, 160, 89, 0.12);
            padding: 16px 20px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s ease;
        }

        .contact-form-wrapper input:focus, 
        .contact-form-wrapper textarea:focus {
            border-color: var(--gold);
            background: rgba(4, 12, 8, 0.6);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.05);
        }

        /* زر الإرسال الذهبي المتناسق */
        .btn-primary {
            background: var(--gold);
            color: #020604;
            border: none;
            padding: 16px 35px;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            align-self: flex-start;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: var(--gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(197, 160, 89, 0.25);
        }

        /* عمود معلومات الاتصال (اليمين في العربي) */
        .contact-info-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        /* تصميم الكروت الفاخرة المربوطة بالفيديو */
        .info-card {
            background: var(--card-bg);
            border: 1px solid rgba(197, 160, 89, 0.08);
            padding: 25px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* يضع الأيقونة في طرف والنص في طرف */
            transition: all 0.3s ease;
        }

        html[dir="rtl"] .info-card { flex-direction: row; }
        html[dir="ltr"] .info-card { flex-direction: row-reverse; }

        .info-card:hover {
            border-color: rgba(197, 160, 89, 0.25);
            background: rgba(4, 12, 8, 0.6);
        }

        .info-card p {
            font-size: 16px;
            color: var(--text-light);
            font-weight: 400;
        }

        .info-card .icon-box {
            width: 45px;
            height: 45px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 18px;
            background: rgba(2, 6, 4, 0.5);
        }

        /* ==========================================================================
           أنميشن الحركة الانسيابية المتتابعة (Reveal Effect)
           ========================================================================= */
        .reveal-node {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 2s cubic-bezier(0.25, 0.46, 0.45, 0.94), 
                        transform 2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .active-reveal .reveal-node {
            opacity: 1;
            transform: translateY(0);
        }

        .active-reveal .delay-1 { transition-delay: 0.5s; }
        .active-reveal .delay-2 { transition-delay: 1s; }
        .active-reveal .delay-3 { transition-delay: 1.5s; }

        /* الفوتر */
        footer {
            text-align: center;
            padding: 35px 20px;
            border-top: 1px solid rgba(197, 160, 89, 0.05);
            background: #010402;
        }

        footer p {
            color: #647196;
            font-size: 13px;
        }

        /* شاشات الموبايل والتجاوب */
        @media (max-width: 992px) {
            .contact-grid-container {
                flex-direction: column-reverse !important; /* يعرض الفورم فوق الكروت في الموبايل */
                gap: 40px;
            }
            .contact-header .main-title {
                font-size: 2.3rem;
            }
            .btn-primary {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="./logo.png" alt="Rolex" class="main-logo" width="85">
        </div>
        <nav>
            <a href="index.html" data-key="nav_home">الرئيسية</a>
            <a href="projects.html" data-key="nav_collection">المجموعة</a>
            <a href="about.html" data-key="nav_heritage">الإرث</a>
            <a href="contact.html" class="active" data-key="nav_contact">تواصل</a>
        </nav>
        <div class="lang-selector">
            <button id="langBtn">🌐 AR العربية</button>
            <div id="langDropdown" class="dropdown-menu">
                <span data-lang="en">EN English</span>
                <span data-lang="ar">AR العربية</span>
                <span data-lang="fr">FR Français</span>
                <span data-lang="de">DE Deutsch</span>
                <span data-lang="es">ES Español</span>
                <span data-lang="it">IT Italiano</span>
                <span data-lang="tr">TR Türkçe</span>
            </div>
        </div>
    </header>

    <!-- القسم الرئيسي للتواصل المربوط بأنميشن التتابع الانسيابي -->
    <section class="contact-section reveal-container">
        
        <!-- العناوين العلوية الممركزة تماماً كالفيديو الأصلي -->
        <div class="contact-header reveal-node delay-1">
            <span class="gold-span" data-key="cont_span">04 — تواصل</span>
            <h2 class="main-title" data-key="cont_title">زر أحد المعارض</h2>
            <p class="desc-text" data-key="cont_desc">اختر رولكس بنفسك.</p>
        </div>

        <div class="contact-grid-container">
            
            <!-- عمود مدخلات الفورم (اليسار) -->
            <div class="contact-form-wrapper reveal-node delay-2">
                <form id="cForm" onsubmit="event.preventDefault();">
                    <input type="text" id="p_name" placeholder="الاسم الكامل" data-placeholder-key="placeholder_name">
                    <input type="email" id="p_email" placeholder="البريد الإلكتروني" data-placeholder-key="placeholder_email">
                    <textarea id="p_msg" placeholder="الرسالة" rows="5" data-placeholder-key="placeholder_msg"></textarea>
                    <button type="submit" class="btn-primary" data-key="cont_btn">إرسال الرسالة</button>
                </form>
            </div>

            <!-- عمود كروت المعلومات الفاخرة (اليمين) -->
            <div class="contact-info-wrapper reveal-node delay-3">
                
                <div class="info-card">
                    <p data-key="info_loc">جنيف، سويسرا</p>
                    <div class="icon-box">📍</div>
                </div>

                <div class="info-card">
                    <p>contact@rolex.example</p>
                    <div class="icon-box">✉️</div>
                </div>

                <div class="info-card">
                    <p dir="ltr">+41 22 302 22 00</p>
                    <div class="icon-box">📞</div>
                </div>

            </div>

        </div>
    </section>

    <footer>
        <p data-key="footer_text">© 2026 ROLEX - جميع الحقوق محفوظة.</p>
    </footer>

    <!-- محرك الترجمة الشامل المخصص لصفحة تواصل معنا لـ 7 لغات بالكامل -->
    <script>
        const translations = {
            ar: {
                langBtnText: "🌐 AR العربية", nav_home: "الرئيسية", nav_collection: "المجموعة", nav_heritage: "الإرث", nav_contact: "تواصل",
                cont_span: "04 — تواصل", cont_title: "زر أحد المعارض", cont_desc: "اختر رولكس بنفسك.", cont_btn: "إرسال الرسالة",
                info_loc: "جنيف، سويسرا", footer_text: "© 2026 ROLEX - جميع الحقوق محفوظة.",
                placeholder_name: "الاسم الكامل", placeholder_email: "البريد الإلكتروني", placeholder_msg: "الرسالة"
            },
            en: {
                langBtnText: "🌐 EN English", nav_home: "Home", nav_collection: "Collection", nav_heritage: "Heritage", nav_contact: "Contact",
                cont_span: "04 — Contact", cont_title: "Visit a Showroom", cont_desc: "Experience Rolex yourself.", cont_btn: "Send Message",
                info_loc: "Geneva, Switzerland", footer_text: "© 2026 ROLEX - All Rights Reserved.",
                placeholder_name: "Full Name", placeholder_email: "Email Address", placeholder_msg: "Message"
            },
            fr: {
                langBtnText: "🌐 FR Français", nav_home: "Accueil", nav_collection: "Collection", nav_heritage: "Héritage", nav_contact: "Contact",
                cont_span: "04 — Contact", cont_title: "Visiter un Salon", cont_desc: "Découvrez Rolex par vous-même.", cont_btn: "Envoyer le Message",
                info_loc: "Genève, Suisse", footer_text: "© 2026 ROLEX - Tous droits réservés.",
                placeholder_name: "Nom Complet", placeholder_email: "Adresse E-mail", placeholder_msg: "Votre Message"
            },
            de: {
                langBtnText: "🌐 DE Deutsch", nav_home: "Startseite", nav_collection: "Kollektion", nav_heritage: "Erbe", nav_contact: "Kontakt",
                cont_span: "04 — Kontakt", cont_title: "Besuchen Sie einen Salon", cont_desc: "Erleben Sie Rolex selbst.", cont_btn: "Nachricht Senden",
                info_loc: "Genf, Schweiz", footer_text: "© 2026 ROLEX - Alle Rechte vorbehalten.",
                placeholder_name: "Vollständiger Name", placeholder_email: "E-Mail-Adresse", placeholder_msg: "Nachricht"
            },
            es: {
                langBtnText: "🌐 ES Español", nav_home: "Inicio", nav_collection: "Colección", nav_heritage: "Legado", nav_contact: "Contacto",
                cont_span: "04 — Contacto", cont_title: "Visite un Distribuidor", cont_desc: "Experimente Rolex usted mismo.", cont_btn: "Enviar Mensaje",
                info_loc: "Ginebra, Suiza", footer_text: "© 2026 ROLEX - Todos los derechos reservados.",
                placeholder_name: "Nombre Completo", placeholder_email: "Correo Electrónico", placeholder_msg: "Mensaje"
            },
            it: {
                langBtnText: "🌐 IT Italiano", nav_home: "Home", nav_collection: "Collezione", nav_heritage: "Eredità", nav_contact: "Contatto",
                cont_span: "04 — Contatto", cont_title: "Visita un Rivenditore", cont_desc: "Sperimenta Rolex tu stesso.", cont_btn: "Invia Messaggio",
                info_loc: "Ginevra, Svizzera", footer_text: "© 2026 ROLEX - Tutti i diritti riservati.",
                placeholder_name: "Nome Completo", placeholder_email: "Indirizzo E-mail", placeholder_msg: "Messaggio"
            },
            tr: {
                langBtnText: "🌐 TR Türkçe", nav_home: "Anasayfa", nav_collection: "Koleksiyon", nav_heritage: "Miras", nav_contact: "İletişim",
                cont_span: "04 — İletişim", cont_title: "Bir Mağazayı Ziyaret Edin", cont_desc: "Rolex'i kendiniz deneyimleyin.", cont_btn: "Mesaj Gönder",
                info_loc: "Cenevre, İsviçre", footer_text: "© 2026 ROLEX - Tüm Hakları Saklıdır.",
                placeholder_name: "Adınız Soyadınız", placeholder_email: "E-posta Adresi", placeholder_msg: "Mesajınız"
            }
        };

        function changeLanguage(lang) {
            const data = translations[lang];
            if (!data) return;
            localStorage.setItem('selectedLanguage', lang);
            
            const langBtn = document.getElementById('langBtn');
            if (langBtn && data.langBtnText) langBtn.innerHTML = data.langBtnText;
            
            const htmlElement = document.documentElement;
            if (lang === 'ar') {
                htmlElement.setAttribute('dir', 'rtl');
                htmlElement.setAttribute('lang', 'ar');
            } else {
                htmlElement.setAttribute('dir', 'ltr');
                htmlElement.setAttribute('lang', lang);
            }

            // ترجمة النصوص الأساسية
            document.querySelectorAll('[data-key]').forEach(element => {
                const key = element.getAttribute('data-key');
                if (data[key]) element.innerText = data[key];
            });

            // ترجمة الـ Placeholders للمدخلات
            document.querySelectorAll('[data-placeholder-key]').forEach(element => {
                const key = element.getAttribute('data-placeholder-key');
                if (data[key]) element.setAttribute('placeholder', data[key]);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('selectedLanguage') || 'ar';
            changeLanguage(savedLang);

            // تفعيل قائمة اللغات المنسدلة
            document.body.addEventListener('click', (e) => {
                if (e.target.matches('#langDropdown span')) {
                    const selectedLang = e.target.getAttribute('data-lang');
                    changeLanguage(selectedLang);
                    const dropdown = document.getElementById('langDropdown');
                    if (dropdown) dropdown.classList.remove('show');
                }
            });

            const langBtn = document.getElementById('langBtn');
            const dropdown = document.getElementById('langDropdown');
            if (langBtn && dropdown) {
                langBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    dropdown.classList.toggle('show');
                });
                document.addEventListener('click', () => { dropdown.classList.remove('show'); });
            }

            // تشغيل أنميشن الـ Reveal الانسيابي عند التحميل والتمرير
            const revealContainers = document.querySelectorAll('.reveal-container');
            const revealObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active-reveal');
                        observer.unobserve(entry.target); 
                    }
                });
            }, { threshold: 0.05 });

            revealContainers.forEach(el => revealObserver.observe(el));
        });
    </script>
</body>
</html>
